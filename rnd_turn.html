<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100만 에코코인 투자 대회 - 발표 순서 추첨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%); /* Light green to light blue gradient */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        /* Glassmorphism effect for the main container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 35px -10px rgba(16, 185, 129, 0.12), 0 4px 6px -4px rgba(59, 130, 246, 0.08);
        }

        /* Team selector buttons */
        .team-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .team-btn.active {
            background-color: #059669; /* Emerald 600 */
            color: #ffffff;
            font-weight: 700;
            border-color: #059669;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.25);
        }

        /* Primary action button styling */
        .draw-btn {
            background: linear-gradient(135deg, #059669 0%, #2563eb 100%);
            transition: transform 0.15s, box-shadow 0.2s;
        }

        .draw-btn:hover {
            box-shadow: 0 6px 20px 0 rgba(16, 185, 129, 0.35);
            transform: translateY(-1px);
        }

        .draw-btn:active {
            transform: translateY(1px);
        }

        .draw-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Result card animation */
        @keyframes popUp {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .result-card {
            animation: popUp 0.3s ease-out forwards;
            opacity: 0;
            transition: all 0.25s ease;
        }

        /* Staggered animation delay */
        .result-card:nth-child(1) { animation-delay: 0.05s; }
        .result-card:nth-child(2) { animation-delay: 0.1s; }
        .result-card:nth-child(3) { animation-delay: 0.15s; }
        .result-card:nth-child(4) { animation-delay: 0.2s; }
        .result-card:nth-child(5) { animation-delay: 0.25s; }
        .result-card:nth-child(6) { animation-delay: 0.3s; }
        .result-card:nth-child(7) { animation-delay: 0.35s; }
        .result-card:nth-child(8) { animation-delay: 0.4s; }
        .result-card:nth-child(9) { animation-delay: 0.45s; }
        .result-card:nth-child(10) { animation-delay: 0.5s; }

        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .shuffling {
            animation: pulse-fast 0.2s infinite;
        }

        .text-accent {
            background: -webkit-linear-gradient(45deg, #059669, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Completed state styling */
        .result-card.completed {
            background-color: #f8fafc !important;
            border-color: #cbd5e1 !important;
            opacity: 0.65;
            transform: scale(0.98);
        }
        .result-card.completed .card-badge {
            background-color: #94a3b8 !important;
            color: #ffffff !important;
        }
        .result-card.completed .card-title {
            text-decoration: line-through;
            color: #64748b !important;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <main class="w-full max-w-4xl mx-auto glass-panel rounded-2xl p-6 sm:p-10">
        
        <!-- Header Section -->
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight text-gray-900 mb-2">
                <span class="text-accent">100만 에코코인</span> 투자 대회
            </h1>
            <p class="text-gray-500 font-medium text-base sm:text-lg">발표 순서를 결정합니다.</p>
            <div class="w-16 h-1 bg-emerald-500 mx-auto mt-4 rounded-full"></div>
        </header>

        <!-- Controls Section: Team Count Selection -->
        <section class="mb-8">
            <label class="block text-xs font-bold text-gray-600 mb-3 uppercase tracking-wider text-center">전체 팀 수 선택</label>
            <div class="flex flex-wrap justify-center gap-2" id="team-selector">
                <!-- Buttons will be generated by JS -->
            </div>
        </section>

        <!-- Action Section: Draw Button -->
        <div class="flex justify-center mb-8">
            <button id="draw-button" disabled
                class="draw-btn text-white font-bold py-3 px-10 rounded-xl shadow-md text-base tracking-wide focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-opacity-50">
                순서 뽑기
            </button>
        </div>

        <!-- Results Section: Horizontal Grid Layout -->
        <section id="result-container" class="hidden">
            <div class="flex flex-col sm:flex-row items-center justify-between mb-4 px-2">
                <h2 class="text-lg font-bold text-gray-800 flex items-center mb-2 sm:mb-0">
                    <svg class="w-5 h-5 mr-2 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    추첨 결과 <span class="text-xs font-normal text-gray-500 ml-2">(발표 완료된 팀 카드를 클릭하면 완료 표시됩니다)</span>
                </h2>
                <button id="reset-button" class="text-xs text-gray-500 hover:text-emerald-600 transition-colors font-medium flex items-center bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">
                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    다시 뽑기
                </button>
            </div>

            <!-- Horizontal alignment grid -->
            <div id="result-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                <!-- Result items injected via JS -->
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const teamSelectorContainer = document.getElementById('team-selector');
            const drawButton = document.getElementById('draw-button');
            const resultContainer = document.getElementById('result-container');
            const resultGrid = document.getElementById('result-grid');
            const resetButton = document.getElementById('reset-button');

            let selectedTeamCount = 0;
            let isDrawing = false;

            // Generate team selection buttons (1 to 10)
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = 'team-btn w-11 h-11 bg-white border border-gray-200 text-gray-700 font-medium rounded-xl shadow-sm flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-emerald-500';
                btn.dataset.value = i;
                
                btn.addEventListener('click', () => selectTeamCount(i, btn));
                teamSelectorContainer.appendChild(btn);
            }

            function selectTeamCount(count, clickedBtn) {
                if (isDrawing) return;

                selectedTeamCount = count;
                
                // Update selection UI
                const buttons = teamSelectorContainer.querySelectorAll('.team-btn');
                buttons.forEach(b => b.classList.remove('active'));
                clickedBtn.classList.add('active');

                // Enable draw button
                drawButton.disabled = false;
                
                // Hide existing results when count changes
                resultContainer.classList.add('hidden');
                resultGrid.innerHTML = '';
            }

            function drawOrder() {
                if (selectedTeamCount === 0 || isDrawing) return;

                isDrawing = true;
                drawButton.disabled = true;
                drawButton.textContent = '추첨 중...';
                drawButton.classList.add('shuffling');
                
                const buttons = teamSelectorContainer.querySelectorAll('.team-btn');
                buttons.forEach(b => b.disabled = true);

                resultContainer.classList.add('hidden');
                resultGrid.innerHTML = '';

                // Simulate brief dramatic shuffling pause
                setTimeout(() => {
                    // Create array [1, 2, ..., selectedTeamCount]
                    const teams = Array.from({ length: selectedTeamCount }, (_, i) => i + 1);
                    
                    // Fisher-Yates Shuffle
                    for (let i = teams.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [teams[i], teams[j]] = [teams[j], teams[i]];
                    }

                    displayResults(teams);
                    
                    isDrawing = false;
                    drawButton.textContent = '순서 뽑기';
                    drawButton.classList.remove('shuffling');
                    drawButton.disabled = false;
                    buttons.forEach(b => b.disabled = false);

                }, 600);
            }

            function displayResults(shuffledTeams) {
                resultContainer.classList.remove('hidden');
                
                shuffledTeams.forEach((teamNumber, index) => {
                    const card = document.createElement('div');
                    card.className = 'result-card bg-white border border-emerald-100 rounded-xl p-4 shadow-sm flex flex-col items-center justify-between text-center cursor-pointer hover:shadow-md hover:border-emerald-300 transition-all select-none';
                    
                    // Highlight color assignment for rank badges
                    let badgeClass = 'bg-emerald-100 text-emerald-800';
                    if (index === 0) badgeClass = 'bg-gradient-to-r from-amber-400 to-amber-500 text-white font-bold shadow-sm';
                    else if (index === 1) badgeClass = 'bg-gradient-to-r from-slate-300 to-slate-400 text-white font-bold shadow-sm';
                    else if (index === 2) badgeClass = 'bg-gradient-to-r from-amber-600 to-amber-700 text-white font-bold shadow-sm';

                    card.innerHTML = `
                        <div class="w-full flex items-center justify-between mb-2">
                            <span class="card-badge text-xs px-2 py-0.5 rounded-full font-semibold ${badgeClass}">
                                ${index + 1}순번
                            </span>
                            <span class="text-xs text-gray-400 status-indicator">대기중</span>
                        </div>
                        <div class="py-2">
                            <span class="card-title text-xl font-bold text-gray-800 tracking-tight">
                                ${teamNumber}팀
                            </span>
                        </div>
                        <div class="w-full mt-2 text-[11px] text-gray-400 border-t border-gray-100 pt-1.5 flex items-center justify-center">
                            클릭하여 완료
                        </div>
                    `;

                    // Click event to toggle completed state
                    card.addEventListener('click', () => {
                        card.classList.toggle('completed');
                        const statusIndicator = card.querySelector('.status-indicator');
                        if (card.classList.contains('completed')) {
                            statusIndicator.textContent = '발표완료';
                            statusIndicator.className = 'text-xs text-emerald-600 font-bold status-indicator';
                        } else {
                            statusIndicator.textContent = '대기중';
                            statusIndicator.className = 'text-xs text-gray-400 status-indicator';
                        }
                    });

                    resultGrid.appendChild(card);
                });
            }

            function reset() {
                if (isDrawing) return;
                
                selectedTeamCount = 0;
                drawButton.disabled = true;
                resultContainer.classList.add('hidden');
                resultGrid.innerHTML = '';
                
                const buttons = teamSelectorContainer.querySelectorAll('.team-btn');
                buttons.forEach(b => b.classList.remove('active'));
            }

            drawButton.addEventListener('click', drawOrder);
            resetButton.addEventListener('click', reset);
        });
    </script>
</body>
</html>
